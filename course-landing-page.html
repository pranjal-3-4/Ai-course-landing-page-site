<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Landing Page</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #4F46E5;
      --primary-dark: #3730A3;
      --accent:    #06B6D4;
      --bg:        #F9FAFB;
      --surface:   #FFFFFF;
      --text:      #111827;
      --muted:     #6B7280;
      --border:    #E5E7EB;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,.08);
      --font:      'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }

    /* ─── Utility ──────────────────────────────────────────────────── */
    .container { max-width: 1080px; margin: 0 auto; padding: 0 24px; }

    section { padding: 80px 0; }
    section:nth-child(even) { background: var(--surface); }

    h2.section-title {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      text-align: center;
      margin-bottom: 48px;
    }

    /* Fade-in animation class (added by JS) */
    .fade-in {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .6s ease, transform .6s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: none;
    }

    /* ─── Buttons ──────────────────────────────────────────────────── */
    .btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: background .2s, transform .15s, box-shadow .2s;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 14px rgba(79,70,229,.35);
    }
    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(79,70,229,.4);
    }

    /* ─── Nav ──────────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      max-width: 1080px;
      margin: 0 auto;
    }
    .nav-brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -.3px;
    }
    .nav-cta { padding: 10px 22px; font-size: .9rem; }

    /* ─── Hero ─────────────────────────────────────────────────────── */
    #hero {
      background: linear-gradient(135deg, #EEF2FF 0%, #E0F2FE 100%);
      padding: 100px 0 90px;
      text-align: center;
    }
    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -.5px;
      margin-bottom: 20px;
      color: var(--text);
    }
    #hero p {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--muted);
      max-width: 600px;
      margin: 0 auto 36px;
    }

    /* ─── Courses ──────────────────────────────────────────────────── */
    #courses { background: var(--bg); }
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }
    .course-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: transform .2s, box-shadow .2s;
    }
    .course-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
    }
    .course-price {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      font-size: .85rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
      letter-spacing: .3px;
    }
    .course-card h3 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .course-card p { color: var(--muted); font-size: .95rem; }
    .course-card .btn { margin-top: 20px; width: 100%; text-align: center; }

    /* ─── Benefits ─────────────────────────────────────────────────── */
    #benefits { background: var(--surface); }
    .benefits-list {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      max-width: 860px;
      margin: 0 auto;
    }
    .benefits-list li {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 20px 22px;
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-weight: 500;
    }
    .benefits-list li::before {
      content: "✓";
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 26px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      font-size: .8rem;
      font-weight: 800;
    }

    /* ─── Testimonials ─────────────────────────────────────────────── */
    #testimonials { background: var(--bg); }
    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    .testimonial-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 26px;
      box-shadow: var(--shadow);
      position: relative;
    }
    .testimonial-card::before {
      content: "\201C";
      position: absolute;
      top: 12px;
      left: 20px;
      font-size: 4rem;
      color: var(--primary);
      opacity: .15;
      line-height: 1;
      font-family: Georgia, serif;
    }
    .testimonial-card p {
      color: var(--muted);
      font-style: italic;
      line-height: 1.7;
    }

    /* ─── Lead Form ────────────────────────────────────────────────── */
    #contact { background: var(--surface); }
    .form-wrapper {
      max-width: 560px;
      margin: 0 auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      box-shadow: var(--shadow);
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: .9rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }
    .form-group input.error {
      border-color: #EF4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,.1);
    }
    .error-msg {
      display: none;
      color: #EF4444;
      font-size: .82rem;
      margin-top: 4px;
      font-weight: 500;
    }
    .error-msg.show { display: block; }
    #form-submit { width: 100%; padding: 14px; font-size: 1.05rem; }
    #success-message {
      display: none;
      text-align: center;
      padding: 28px 20px;
    }
    #success-message .checkmark {
      font-size: 3rem;
      margin-bottom: 12px;
    }
    #success-message h3 {
      font-size: 1.4rem;
      margin-bottom: 8px;
      color: var(--primary);
    }
    #success-message p { color: var(--muted); }

    /* ─── Footer ───────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 28px 24px;
      background: var(--text);
      color: rgba(255,255,255,.55);
      font-size: .88rem;
    }

    /* ─── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 600px) {
      section { padding: 60px 0; }
      .form-wrapper { padding: 28px 20px; }
      nav { padding: 14px 16px; }
    }

    /* ─── Floating Contact Buttons ─────────────────────────────────── */
    .float-buttons {
      position: fixed;
      bottom: 28px;
      right: 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 14px;
      z-index: 999;
    }

    .float-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      border-radius: 999px;
      padding: 13px 20px;
      font-size: .92rem;
      font-weight: 700;
      font-family: var(--font);
      color: #fff;
      box-shadow: 0 6px 20px rgba(0,0,0,.18);
      transition: transform .2s, box-shadow .2s, padding .3s;
      white-space: nowrap;
      overflow: hidden;
      max-width: 56px;
    }

    .float-btn:hover {
      max-width: 260px;
      padding: 13px 22px;
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(0,0,0,.22);
    }

    .float-btn svg {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
    }

    .float-btn-label {
      opacity: 0;
      transition: opacity .2s .05s;
      pointer-events: none;
    }
    .float-btn:hover .float-btn-label { opacity: 1; }

    .float-btn-whatsapp { background: #25D366; }
    .float-btn-whatsapp:hover { background: #1ebe5b; }

    .float-btn-call { background: var(--primary); }
    .float-btn-call:hover { background: var(--primary-dark); }

    /* Pulse ring on WhatsApp button */
    .float-btn-whatsapp::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 999px;
      border: 3px solid #25D366;
      animation: pulse-ring 2.4s ease-out infinite;
    }
    .float-btn { position: relative; }

    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: .7; }
      70%  { transform: scale(1.55); opacity: 0; }
      100% { opacity: 0; }
    }

    @media (max-width: 600px) {
      .float-buttons { bottom: 20px; right: 16px; gap: 12px; }
      .float-btn { padding: 12px 16px; }
    }
  </style>
</head>
<body>

      </div>

      <!--

        - data-netlify="true" tells Netlify to handle this form
        - The hidden input "form-name" is required for Netlify detection
      -->
      <form id="lead-form" name="lead-form" method="POST" data-netlify="true">

        <input type="hidden" name="form-name" value="lead-form" />

<!-- ================================================================
  JAVASCRIPT — Rendering, form validation, and animations
================================================================ -->
<script>
  /* ── 1. Populate content from SITE_CONFIG ─────────────────────── */
  function renderSite() {
    /* Brand name */
    document.title = SITE_CONFIG.brandName;
    document.getElementById("nav-brand").textContent = SITE_CONFIG.brandName;

    /* Hero */
    document.getElementById("hero-headline").textContent    = SITE_CONFIG.headline;
    document.getElementById("hero-subheadline").textContent = SITE_CONFIG.subheadline;
    document.getElementById("hero-cta").textContent         = SITE_CONFIG.ctaLabel || "Explore Courses";

    /* Courses */
    const coursesGrid = document.getElementById("courses-grid");
    SITE_CONFIG.courses.forEach(function(course) {
      const card = document.createElement("div");
      card.className = "course-card fade-in";
      card.innerHTML =
        '<span class="course-price">' + course.price + '</span>' +
        '<h3>' + course.title + '</h3>' +
        '<p>' + course.description + '</p>' +
        '<a href="#contact" class="btn btn-primary">Enroll Now</a>';
      coursesGrid.appendChild(card);
    });

    /* Benefits */
    const benefitsList = document.getElementById("benefits-list");
    SITE_CONFIG.benefits.forEach(function(benefit) {
      const li = document.createElement("li");
      li.className = "fade-in";
      li.textContent = benefit;
      benefitsList.appendChild(li);
    });

    /* Testimonials */
    const testimonialsGrid = document.getElementById("testimonials-grid");
    SITE_CONFIG.testimonials.forEach(function(testimonial) {
      const card = document.createElement("div");
      card.className = "testimonial-card fade-in";
      card.innerHTML = '<p>' + testimonial + '</p>';
      testimonialsGrid.appendChild(card);
    });

    /* Form headlines */
    document.getElementById("form-headline").textContent    = SITE_CONFIG.formHeadline    || "Get in Touch";
    document.getElementById("form-subheadline").textContent = SITE_CONFIG.formSubheadline || "";

    /* Footer */
    document.getElementById("footer-text").textContent = SITE_CONFIG.footerText || "";
  }

  /* ── 2. Fade-in animation using IntersectionObserver ──────────── */
  function setupFadeIn() {
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add("visible");
          observer.unobserve(entry.target); // animate once
        }
      });
    }, { threshold: 0.12 });

    document.querySelectorAll(".fade-in").forEach(function(el) {
      observer.observe(el);
    });
  }

  /* ── 3. Lead form validation ──────────────────────────────────── */
  function setupForm() {
    var form    = document.getElementById("lead-form");
    var success = document.getElementById("success-message");

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      var valid = true;

      /* Name — must not be empty */
      var nameInput = document.getElementById("name");
      var nameError = document.getElementById("name-error");
      if (nameInput.value.trim().length < 2) {
        nameInput.classList.add("error");
        nameError.classList.add("show");
        valid = false;
      } else {
        nameInput.classList.remove("error");
        nameError.classList.remove("show");
      }

      /* Phone — must be exactly 10 digits */
      var phoneInput = document.getElementById("phone");
      var phoneError = document.getElementById("phone-error");
      var phoneRegex = /^[6-9]\d{9}$/;
      if (!phoneRegex.test(phoneInput.value.trim())) {
        phoneInput.classList.add("error");
        phoneError.classList.add("show");
        valid = false;
      } else {
        phoneInput.classList.remove("error");
        phoneError.classList.remove("show");
      }

      /* Email — basic format check */
      var emailInput = document.getElementById("email");
      var emailError = document.getElementById("email-error");
      var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(emailInput.value.trim())) {
        emailInput.classList.add("error");
        emailError.classList.add("show");
        valid = false;
      } else {
        emailInput.classList.remove("error");
        emailError.classList.remove("show");
      }

      if (!valid) return; // stop if any field is invalid

      /*
        On Netlify, form submission is handled automatically.
        For local preview (no Netlify), we skip the fetch and show the success message directly.
        When deployed on Netlify, remove the preventDefault and let the form submit normally,
        OR use the fetch() block below for AJAX submission.
      */
      var formData = new FormData(form);

      fetch("/", {
        method:  "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body:    new URLSearchParams(formData).toString()
      })
      .then(function() {
        showSuccess();
      })
      .catch(function() {
        /* Fallback: show success even if fetch fails (e.g. local dev) */
        showSuccess();
      });
    });

    function showSuccess() {
      form.style.display    = "none";
      success.style.display = "block";
    }

    /* Remove error styling on input focus */
    ["name", "phone", "email"].forEach(function(id) {
      document.getElementById(id).addEventListener("input", function() {
        this.classList.remove("error");
        document.getElementById(id + "-error").classList.remove("show");
      });
    });
  }

  /* ── 4. Floating WhatsApp & Call buttons ──────────────────────── */
  function renderFloatButtons() {
    var container = document.getElementById("float-buttons");
    if (!container) return;

    /* WhatsApp button — always shown */
    var waNumber  = (SITE_CONFIG.whatsappNumber  || "").replace(/\D/g, "");
    var waMessage = encodeURIComponent(SITE_CONFIG.whatsappMessage || "Hi! I'm interested in your courses.");
    var waHref    = "https://wa.me/" + waNumber + "?text=" + waMessage;

    var waBtn = document.createElement("a");
    waBtn.href      = waHref;
    waBtn.target    = "_blank";
    waBtn.rel       = "noopener noreferrer";
    waBtn.className = "float-btn float-btn-whatsapp";
    waBtn.setAttribute("aria-label", "Chat on WhatsApp");
    waBtn.innerHTML =
      /* WhatsApp SVG icon */
      '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">' +
        '<path d="M20.52 3.48A11.93 11.93 0 0 0 12 0C5.37 0 0 5.37 0 12c0 2.11.55 4.17 1.6 5.98L0 24l6.18-1.62A11.94 11.94 0 0 0 12 24c6.63 0 12-5.37 12-12 0-3.2-1.25-6.21-3.48-8.52zM12 22c-1.85 0-3.67-.5-5.24-1.44l-.38-.22-3.67.96.98-3.58-.25-.38A9.94 9.94 0 0 1 2 12C2 6.49 6.49 2 12 2c2.67 0 5.18 1.04 7.07 2.93A9.93 9.93 0 0 1 22 12c0 5.51-4.49 10-10 10zm5.44-7.42c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07a8.16 8.16 0 0 1-2.4-1.48 9.05 9.05 0 0 1-1.66-2.07c-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.61-.92-2.2-.24-.58-.49-.5-.67-.51l-.57-.01c-.2 0-.52.07-.79.37-.27.3-1.03 1.01-1.03 2.46s1.06 2.85 1.2 3.05c.15.2 2.08 3.18 5.05 4.46.7.3 1.25.48 1.68.62.7.22 1.34.19 1.85.12.56-.08 1.76-.72 2.01-1.41.25-.69.25-1.28.17-1.41-.07-.13-.27-.2-.57-.35z"/>' +
      '</svg>' +
      '<span class="float-btn-label">Chat on WhatsApp</span>';

    container.appendChild(waBtn);

    /* Call button — shown only if showCallButton is not false */
    if (SITE_CONFIG.showCallButton !== false && SITE_CONFIG.callNumber) {
      var callBtn = document.createElement("a");
      callBtn.href      = "tel:" + SITE_CONFIG.callNumber;
      callBtn.className = "float-btn float-btn-call";
      callBtn.setAttribute("aria-label", "Call us");
      callBtn.innerHTML =
        /* Phone SVG icon */
        '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">' +
          '<path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1C10.61 21 3 13.39 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.45.57 3.58a1 1 0 0 1-.25 1.01l-2.2 2.2z"/>' +
        '</svg>' +
        '<span class="float-btn-label">Call Us Now</span>';

      container.appendChild(callBtn);
    }
  }

  /* ── 5. Run everything ────────────────────────────────────────── */
  renderSite();
  setupFadeIn();  // must run AFTER renderSite so dynamic elements exist
  setupForm();
  renderFloatButtons();
</script>
